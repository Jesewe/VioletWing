name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup works),
# and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # This name is required — Copilot will not pick up the job under any other name.
  copilot-setup-steps:
    # NOTE: VioletWing depends on pywin32 and pyMeow, which are Windows-only at runtime.
    # Ubuntu is used here so Copilot gets a fast, standard environment for code analysis
    # and editing. If you need Copilot to actually execute the app or run pywin32-dependent
    # code paths, switch this to `windows-latest` (requires a larger runner or self-hosted).
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        # pywin32 and pyMeow are Windows-only and will fail on Linux.
        # We install everything else from requirements.txt, then let Copilot
        # have a complete cross-platform package graph for analysis.
        run: |
          python -m pip install --upgrade pip
          grep -v -i "pywin32\|pyMeow" requirements.txt | pip install -r /dev/stdin